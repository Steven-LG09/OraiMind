<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AI Ops Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        textarea,
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0ea5e9;
        }

        .response {
            margin-top: 20px;
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🤖 AI Ops Manager</h1>

        <input id="user" placeholder="User (e.g. support_team)" />

        <textarea id="text" rows="4" placeholder="Describe the issue..."></textarea>

        <button onclick="sendRequest()">Send Request</button>

        <div class="response" id="responseBox">Response will appear here...</div>
    </div>

    <script>
        const WEBHOOK_URL = "http://localhost:5678/webhook-test/ai-ops-manager";

        async function sendRequest() {
            const text = document.getElementById("text").value;
            const user = document.getElementById("user").value;

            const responseBox = document.getElementById("responseBox");
            responseBox.innerText = "Processing...";

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text,
                        user
                    })
                });

                const data = await res.json();

                responseBox.innerText = JSON.stringify(data, null, 2);

            } catch (error) {
                responseBox.innerText = "Error: " + error.message;
            }
        }
    </script>

</body>

</html>
